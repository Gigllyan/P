<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio · Gko</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap');
:root{--bg:#07090f;--card:#111820;--border:#1c2535;--accent:#4fffb0;--accent2:#38bdf8;--muted:#5d7a9b;--text:#dde6f5;--danger:#ef4444;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);opacity:.35;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 40%,rgba(79,255,176,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 60%,rgba(56,189,248,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.4rem 2rem;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.55);text-align:center}
.badge{display:inline-flex;align-items:center;gap:.5rem;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.06em;border-radius:20px;padding:.3rem .9rem;margin-bottom:1.8rem;border:1px solid}
.badge.offline{color:var(--danger);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--danger)}
h1{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
h1 em{font-style:normal;background:linear-gradient(125deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:.9rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}
.offline-msg{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:12px;padding:1rem;font-size:.85rem;color:#fca5a5;margin-bottom:1.8rem;line-height:1.6}
.contact-section{margin-top:2rem;padding-top:1.6rem;border-top:1px solid var(--border)}
.contact-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1rem}
.contact-links{display:flex;flex-direction:column;gap:.6rem}
.contact-link{display:flex;align-items:center;gap:.75rem;padding:.65rem .9rem;background:#0d1117;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);font-size:.85rem;transition:border-color .2s,color .2s}
.contact-link:hover{border-color:var(--accent);color:var(--accent)}
.contact-label{font-weight:600}
.contact-val{margin-left:auto;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
.timestamp{margin-top:1.6rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);opacity:.5}
</style>
</head>
<body>
<div class="card">
  <div class="badge offline"><span class="dot"></span> servidor offline</div>
  <h1>Gko<br><em>Portfólio</em></h1>
  <p class="subtitle">Desenvolvedor Full Stack · PHP · JS · Mobile</p>
  <div class="offline-msg">
    😴 O servidor está temporariamente offline.<br>
    Deixe uma mensagem — responderei em breve!
  </div>
  <div class="contact-section">
    <div class="contact-title">Entre em contato</div>
    <div class="contact-links">
      <a href="https://github.com/gigllyan" target="_blank" rel="noopener" class="contact-link">
        <span>⌥</span>
        <span class="contact-label">GitHub</span>
        <span class="contact-val">gigllyan</span>
      </a>
      <a href="mailto:contato@exemplo.com" class="contact-link">
        <span>✉</span>
        <span class="contact-label">E-mail</span>
        <span class="contact-val">contato@exemplo.com</span>
      </a>
    </div>
  </div>
  <div class="timestamp">Atualizado: 04/06/2026 19:17</div>
</div>
</body>
</html>
