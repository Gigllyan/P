<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap');
:root{--bg:#07090f;--card:#111820;--border:#1c2535;--accent:#f59e0b;--accent2:#38bdf8;--muted:#5d7a9b;--text:#dde6f5;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.4rem 2rem;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.55);text-align:center}
.badge{display:inline-flex;align-items:center;gap:.5rem;font-family:'DM Mono',monospace;font-size:.72rem;border-radius:20px;padding:.3rem .9rem;margin-bottom:1.8rem;border:1px solid;color:var(--warn);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--warn);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.6rem}
h1 em{font-style:normal;background:linear-gradient(125deg,var(--warn),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.9rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.6}
.msg{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:1.4rem;font-size:.88rem;color:#fde68a;margin-bottom:2rem;line-height:1.7}
.links{display:flex;flex-direction:column;gap:.6rem;margin-top:1.2rem}
.contact-link{display:flex;align-items:center;gap:.75rem;padding:.75rem .9rem;background:#0d1117;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);font-size:.88rem;transition:all .2s}
.contact-link:hover{border-color:var(--warn);color:var(--warn);transform:translateX(4px)}
.ts{margin-top:2rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);opacity:.5}
</style></head><body>
<div class="card">
  <div class="badge"><span class="dot"></span> em manutenção</div>

</div>
</body></html>
