<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfólio · Gko</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#07090f}
#pf-iframe{display:block;width:100%;height:100vh;border:none}
#pf-loader{position:fixed;inset:0;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:sans-serif;color:#4fffb0;z-index:99;transition:opacity .4s}
#pf-loader.hidden{opacity:0;pointer-events:none}
.pf-dot{width:10px;height:10px;border-radius:50%;background:#4fffb0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.pf-label{font-size:.8rem;color:#5d7a9b}
</style>
</head><body>
<div id="pf-loader">
  <div class="pf-dot"></div>
  <div class="pf-label">carregando portfólio...</div>
</div>
<iframe id="pf-iframe" src="about:blank" title="Portfólio"></iframe>
<script>
(function(){
  var base='https://ringtone-thereby-reflected-jean.trycloudflare.com';
  var params=new URLSearchParams(window.location.search);
  var page=params.get('page');
  var project=params.get('project');
  var path='';
  var pageMap={projects:'projects.php',admin:'admin/dashboard.php'};
  if(project){
    path='uploads/projects/'+encodeURIComponent(project)+'/';
  } else if(page&&pageMap[page]){
    path=pageMap[page];
  }
  var iframe=document.getElementById('pf-iframe');
  var loader=document.getElementById('pf-loader');
  iframe.src=base.replace(/\/+$/,'')+(path?'/'+path:'');
  iframe.onload=function(){loader.classList.add('hidden');};
  setTimeout(function(){loader.classList.add('hidden');},8000);
})();
</script>
</body></html>
