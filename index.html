<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfólio · Gko</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#07090f}
#pf-iframe{display:block;width:100%;height:100vh;border:none}
#pf-loader{position:fixed;inset:0;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:'Syne',sans-serif;color:#4fffb0;z-index:99;transition:opacity .4s}
#pf-loader.hidden{opacity:0;pointer-events:none}
.pf-dot{width:10px;height:10px;border-radius:50%;background:#4fffb0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.pf-label{font-size:.8rem;color:#5d7a9b;font-family:'DM Mono',monospace}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
</head><body>
<div id="pf-loader">
  <div class="pf-dot"></div>
  <div class="pf-label">carregando portfólio...</div>
</div>
<iframe id="pf-iframe" src="about:blank" title="Portfólio · Gko" allow="fullscreen"></iframe>
<script>
(function(){
  var base='https://powerpoint-devoted-witness-borders.trycloudflare.com';
  var pageMap={
    'projects':'projects.php',
    'admin':'admin/dashboard.php'
  };
  var params=new URLSearchParams(window.location.search);
  var page=params.get('page');
  var path=page&&pageMap[page]?pageMap[page]:'';
  var src=base.replace(/\/+$/,'')+(path?'/'+path:'');
  var iframe=document.getElementById('pf-iframe');
  var loader=document.getElementById('pf-loader');
  iframe.src=src;
  iframe.onload=function(){
    loader.classList.add('hidden');
    setTimeout(function(){loader.style.display='none';},500);
  };
  setTimeout(function(){loader.classList.add('hidden');},8000);
})();
</script>
</body></html>
