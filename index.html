<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfólio · Gko</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#07090f;font-family:sans-serif}
#pf-iframe{display:block;width:100%;height:100vh;border:none}
#pf-loader{
  position:fixed;inset:0;background:#07090f;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;color:#4fffb0;z-index:99;
  transition:opacity .5s
}
#pf-loader.hidden{opacity:0;pointer-events:none}
.pf-dot{width:10px;height:10px;border-radius:50%;background:#4fffb0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.pf-label{font-size:.8rem;color:#5d7a9b}
</style>
</head>
<body>

<div id="pf-loader">
  <div class="pf-dot"></div>
  <div class="pf-label">carregando portfólio...</div>
</div>

<iframe id="pf-iframe" src="about:blank" title="Portfólio Gko"></iframe>

<script>
(function(){
  var TUNNEL = 'https://hall-kitchen-chapter-entrepreneur.trycloudflare.com';
  var params = new URLSearchParams(window.location.search);
  var page    = params.get('page');
  var project = params.get('project');

  // Monta a URL de destino no tunnel
  var dest = TUNNEL.replace(/\/+$/, '');
  if (project) {
    dest += '/uploads/projects/' + encodeURIComponent(project) + '/';
  } else if (page === 'projects') {
    dest += '/projects.php';
  } else if (page === 'admin') {
    dest += '/admin/dashboard.php';
  }
  // Repassa query extras exceto page/project
  var extras = [];
  params.forEach(function(v, k){
    if (k !== 'page' && k !== 'project') extras.push(k + '=' + encodeURIComponent(v));
  });
  if (extras.length) dest += (dest.includes('?') ? '&' : '?') + extras.join('&');

  var iframe  = document.getElementById('pf-iframe');
  var loader  = document.getElementById('pf-loader');

  iframe.src = dest;
  iframe.onload = function(){ loader.classList.add('hidden'); };
  setTimeout(function(){ loader.classList.add('hidden'); }, 10000);

  // Intercepta navegação dentro do iframe para manter URL do GitHub atualizada
  iframe.addEventListener('load', function(){
    try {
      var ipath = iframe.contentWindow.location.pathname;
      var newParam = '';
      if (ipath.includes('/projects.php')) newParam = '?page=projects';
      else if (ipath.includes('/uploads/projects/')) {
        var m = ipath.match(/\/uploads\/projects\/([^/]+)\//);
        if (m) newParam = '?project=' + encodeURIComponent(m[1]);
      }
      if (newParam && window.location.search !== newParam) {
        history.replaceState(null, '', newParam);
      }
    } catch(e){ /* cross-origin — ok */ }
  });
})();
</script>

</body>
</html>
