<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfólio · Gko</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#07090f;font-family:sans-serif}
#pf-iframe{display:block;width:100%;height:100vh;border:none}
#pf-loader{
  position:fixed;inset:0;background:#07090f;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;color:#4fffb0;z-index:99;
  transition:opacity .5s
}
#pf-loader.hidden{opacity:0;pointer-events:none}
.pf-dot{width:10px;height:10px;border-radius:50%;background:#4fffb0;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.pf-label{font-size:.8rem;color:#5d7a9b}
</style>
</head>
<body>

<div id="pf-loader">
  <div class="pf-dot"></div>
  <div class="pf-label">carregando portfólio...</div>
</div>

<iframe id="pf-iframe" src="about:blank" title="Portfólio Gko"></iframe>

<script>
(function(){
  var TUNNEL = 'https://left-anniversary-outsourcing-sink.trycloudflare.com';
  var params = new URLSearchParams(window.location.search);
  var page    = params.get('page');
  var project = params.get('project');

  // Monta a URL de destino no tunnel
  var TUNNEL  = 'https://left-anniversary-outsourcing-sink.trycloudflare.com'.replace(/\/+$/, '');
  var iframe  = document.getElementById('pf-iframe');
  var loader  = document.getElementById('pf-loader');

  // Mapeamento de page= para path no tunnel
  var pageMap = {
    'projects': '/projects.php',
    'admin':    '/admin/dashboard.php',
    'analytics':'/admin/analytics.php',
    'settings': '/admin/settings.php',
    'login':    '/admin/login.php',
  };

  // Monta URL de destino inicial
  function buildDest(p, proj, extra) {
    var base = TUNNEL;
    if (proj) {
      // Busca o entry do projeto via API para não depender de hardcode
      // Fallback: tenta index.php, depois index.html
      base += '/uploads/projects/' + encodeURIComponent(proj) + '/';
    } else if (p && pageMap[p]) {
      base += pageMap[p];
    }
    if (extra) base += (base.includes('?') ? '&' : '?') + extra;
    return base;
  }

  // Extrai params relevantes
  var page    = params.get('page')    || '';
  var project = params.get('project') || '';
  var extras  = [];
  params.forEach(function(v, k){
    if (k !== 'page' && k !== 'project') extras.push(k + '=' + encodeURIComponent(v));
  });

  var dest = buildDest(page, project, extras.join('&'));
  iframe.src = dest;

  // Oculta loader quando carrega
  iframe.onload = function(){ loader.classList.add('hidden'); };
  setTimeout(function(){ loader.classList.add('hidden'); }, 12000);

  // Intercepta navegação interna do iframe
  // Atualiza a URL do GitHub e intercepta links admin/externos
  function onIframeLoad() {
    try {
      var iwin  = iframe.contentWindow;
      var ipath = iwin.location.pathname;
      var iq    = iwin.location.search;

      // Atualiza URL do GitHub Pages para refletir a página atual
      var ghParam = '';
      if (ipath.match(/\/uploads\/projects\/([^/]+)/)) {
        var m = ipath.match(/\/uploads\/projects\/([^/]+)/);
        ghParam = '?project=' + encodeURIComponent(m[1]);
      } else if (ipath.includes('/projects.php')) {
        ghParam = '?page=projects' + (iq ? '&' + iq.slice(1) : '');
      } else if (ipath.includes('/admin/analytics.php')) {
        ghParam = '?page=analytics';
      } else if (ipath.includes('/admin/settings.php')) {
        ghParam = '?page=settings';
      } else if (ipath.includes('/admin/')) {
        ghParam = '?page=admin';
      } else {
        ghParam = '';
      }

      if (window.location.search !== ghParam) {
        history.replaceState(null, '', ghParam || window.location.pathname);
      }

      // Intercepta todos os <a> dentro do iframe
      // para que links que abrissem em nova aba sejam roteados pelo iframe
      var links = iwin.document.querySelectorAll('a[href]');
      links.forEach(function(a) {
        a.removeEventListener('click', handleIframeLink);
        a.addEventListener('click', handleIframeLink);
      });

    } catch(e) { /* cross-origin — ok, não conseguimos interceptar */ }
  }

  function handleIframeLink(e) {
    try {
      var href = this.getAttribute('href') || '';
      // Ignora âncoras, mailto, tel, javascript e externos não-tunnel
      if (!href || href.startsWith('#') || href.startsWith('mailto:') ||
          href.startsWith('tel:') || href.startsWith('javascript:')) return;

      // Se for link relativo ou do tunnel — deixa o iframe navegar normalmente
      if (!href.startsWith('http') || href.startsWith(TUNNEL)) return;

      // Link absoluto externo (ex: github.com, linkedin, etc) — abre em nova aba
      // mas NÃO sai do iframe do GitHub Pages
      e.preventDefault();
      window.open(href, '_blank', 'noopener');
    } catch(err) {}
  }

  iframe.addEventListener('load', onIframeLoad);
</script>

</body>
</html>
